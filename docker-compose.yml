services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payer_portal
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d payer_portal']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      NODE_ENV: development
      APP_NAME: payer-api
      DATABASE_URL: postgres://dev:dev@postgres:5432/payer_portal
    command: pnpm --filter api dev
    ports:
      - '3001:3001'

  portal-web:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    environment:
      NODE_ENV: development
      PORT: 3000
    command: pnpm --filter portal-web exec next dev --hostname 0.0.0.0 --port 3000
    ports:
      - '3000:3000'

  admin-console:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    environment:
      NODE_ENV: development
      PORT: 3002
    command: pnpm --filter admin-console exec next dev --hostname 0.0.0.0 --port 3002
    ports:
      - '3002:3002'

volumes:
  postgres-data:
