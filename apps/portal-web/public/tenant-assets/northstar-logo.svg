<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="starGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0C36A"></stop>
      <stop offset="100%" stop-color="#B9922E"></stop>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D7DDE5"></stop>
      <stop offset="100%" stop-color="#8E99A6"></stop>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="260" rx="20" fill="#0B1F3B"></rect>

  <!-- Emblem group -->
  <g transform="translate(48 36)" filter="url(#softShadow)">
    <!-- Outer shield -->
    <path d="M92 0
             L164 28
             L164 102
             C164 152 130 189 92 208
             C54 189 20 152 20 102
             L20 28
             Z" fill="#132C4E" stroke="url(#steel)" stroke-width="4"></path>

    <!-- Compass ring -->
    <circle cx="92" cy="84" r="46" fill="none" stroke="#5E6B7A" stroke-width="4"></circle>
    <circle cx="92" cy="84" r="34" fill="none" stroke="#2E3E53" stroke-width="2"></circle>

    <!-- Cardinal points -->
    <path d="M92 26 L100 56 L92 50 L84 56 Z" fill="url(#starGold)"></path>
    <path d="M92 142 L100 112 L92 118 L84 112 Z" fill="url(#starGold)"></path>
    <path d="M34 84 L64 76 L58 84 L64 92 Z" fill="url(#starGold)"></path>
    <path d="M150 84 L120 76 L126 84 L120 92 Z" fill="url(#starGold)"></path>

    <!-- North star -->
    <path d="M92 46
             L100 76
             L130 84
             L100 92
             L92 122
             L84 92
             L54 84
             L84 76
             Z" fill="url(#starGold)" stroke="#F1DA8F" stroke-width="2"></path>

    <!-- Precision chevrons -->
    <path d="M92 156 L122 142 L114 160 L92 170 L70 160 L62 142 Z" fill="#415166" opacity="0.9"></path>
    <path d="M92 176 L112 166 L106 180 L92 188 L78 180 L72 166 Z" fill="#6C7A89" opacity="0.95"></path>
  </g>

  <!-- Wordmark -->
  <g transform="translate(248 58)">
    <text x="0" y="72" fill="#F5F7FA" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" letter-spacing="5">
      NORTHSTAR
    </text>

    <text x="3" y="122" fill="#C7CED6" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="8">
      MANUFACTURING
    </text>

    <!-- Accent line -->
    <rect x="0" y="145" width="438" height="4" rx="2" fill="url(#starGold)"></rect>

    <!-- Tagline -->
    <text x="0" y="182" fill="#98A6B5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" letter-spacing="2">
      PRECISION • RELIABILITY • MISSION FOCUS
    </text>
  </g>
</svg>